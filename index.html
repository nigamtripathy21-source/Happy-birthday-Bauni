<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Colorful, vibrant gradient background */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        h1 {
            color: #ff4757;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #57606f;
            font-style: italic;
            margin-bottom: 30px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-weight: bold;
            color: #2f3542;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* Interactive Box Section */
        .interactive-box {
            background: #f1f2f6;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #333;
            border-left: 5px solid #ff4757;
        }

        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        button:hover {
            background: #ff6b81;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Floating Confetti/Hearts effect */
        .heart {
            position: absolute;
            font-size: 1.5rem;
            animation: floatUp 6s linear infinite;
            opacity: 0;
            bottom: -50px;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Floating Background Elements created by JS -->

    <div class="container">
        <h1>Happy Birthday, Shorty! 🎂</h1>
        <p class="subtitle">A highly customized, 100% accurate profile of you.</p>

        <div class="card-grid">
            <div class="card">🍫 Chocolate Obsession</div>
            <div class="card">🍦 Ice Cream > People</div>
            <div class="card">📐 4'11" (Barely)</div>
            <div class="card">🍹 Part-time Alcoholic</div>
        </div>

        <hr style="border: 0; height: 1px; background: #e0e0e0; margin: 20px 0;">

        <p style="color: #747d8c; font-size: 0.9rem;">Click below for a heartfelt truth bomb:</p>
        
        <div class="interactive-box" id="joke-box">
            Click the button below to start the roasting/validation process.
        </div>

        <button onclick="generateMessage()">Click For a Surprise</button>
    </div>

    <script>
        // Array of inside jokes, roasts, and sweet messages
        const messages = [
            "Happy Birthday! You’re legally required to wear a high-visibility jacket in large crowds so I don't lose you. 🕵️‍♂️",
            "I sent you a text message in 2025. It is currently 2026. I am still waiting for the typing bubbles to appear. ⏳",
            "Honestly, your reply speed is like government paperwork. Slow, confusing, and requires three follow-ups. 📄",
            "Pros of being 4'11\": You fit easily into any car. Cons: You still need a booster seat to see over the dashboard. 🚗",
            "Behind all the short jokes and your terrible texting habits, you're actually my favorite person to hang out with. Happy Birthday! ❤️",
            "I love how I can use your head as a physical armrest. Truly the most functional, space-saving friend ever. 📐",
            "Let's celebrate today with an infinite supply of chocolate ice cream... and maybe a drink or three. Cheers to you! 🥂🍦",
            "You’re not short, your growth just got stunted because your body prioritized personality and attitude. 😤",
            "Joke aside, you make everything a lot more fun. Thanks for existing, even if you take 5 business days to text back. Happy Birthday!✨"
        ];

        let lastIndex = -1;

        function generateMessage() {
            const jokeBox = document.getElementById('joke-box');
            
            // Ensure we don't repeat the same message twice in a row
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * messages.length);
            } while (randomIndex === lastIndex);
            
            lastIndex = randomIndex;
            
            // Apply a quick fade effect
            jokeBox.style.opacity = 0;
            setTimeout(() => {
                jokeBox.innerText = messages[randomIndex];
                jokeBox.style.opacity = 1;
            }, 150);
        }

        // Script to generate random floating emojis in background
        const emojis = ['🎈', '🍫', '🍦', '🍹', '❤️'];
        
        function createFloatingEmoji() {
            const emoji = document.createElement('div');
            emoji.classList.add('heart');
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.animationDuration = (Math.random() * 3 + 4) + "s"; // between 4-7s
            emoji.style.fontSize = (Math.random() * 1 + 1) + "rem";
            
            document.body.appendChild(emoji);

            // Clean up elements after they float off screen
            setTimeout(() => {
                emoji.remove();
            }, 7000);
        }

        // Keep spawning background elements
        setInterval(createFloatingEmoji, 400);
    </script>
</body>
</html>
